<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>
<style>
  :root {
    /* ИМЯ МЕНЯЕТСЯ В HTML НИЖЕ, в теге <h1> */
    --c1: #ff6b9d;
    --c2: #c44fe0;
    --c3: #5b7cff;
    --c4: #ff9a8b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }

  body {
    background: linear-gradient(-45deg, var(--c1), var(--c2), var(--c3), var(--c4));
    background-size: 400% 400%;
    animation: gradient 14s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    position: relative;
  }
  @keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .label {
    font-size: clamp(1rem, 3vw, 1.6rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 0.3s;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  h1 {
    font-size: clamp(3.5rem, 16vw, 11rem);
    font-weight: 800;
    margin: 0.1em 0 0.2em;
    line-height: 1;
    opacity: 0;
    animation: pop 1.3s cubic-bezier(.2,1.4,.4,1) forwards 0.7s;
    text-shadow: 0 6px 40px rgba(0,0,0,0.25);
    background: linear-gradient(180deg, #fff, #ffe3ef);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    font-size: clamp(1.1rem, 3.5vw, 2rem);
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 1.6s;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    max-width: 90%;
  }

  button {
    margin-top: 2.5rem;
    padding: 1rem 2.5rem;
    font-size: 1.15rem;
    font-weight: 600;
    color: #c44fe0;
    background: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 2.3s;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
  button:active { transform: scale(0.97); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { opacity: 0; transform: scale(0.3) rotate(-8deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }

  .heart {
    position: absolute;
    bottom: -50px;
    font-size: 2rem;
    pointer-events: none;
    animation: float linear forwards;
    z-index: 1;
  }
  @keyframes float {
    to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .extras {
    margin-top: 1.6rem;
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 2.8s;
    z-index: 2;
  }
  .extras a {
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 500;
    padding: 0.6rem 1.3rem;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 50px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(4px);
    transition: transform .15s ease, background .15s ease;
  }
  .extras a:hover { transform: translateY(-2px); background: rgba(255,255,255,0.28); }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: rgba(255,255,255,0.95);
    color: #c44fe0;
    padding: 1rem 1.8rem;
    border-radius: 50px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    transition: transform .4s cubic-bezier(.2,1.4,.4,1);
    z-index: 10;
    max-width: 90%;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="label">Это для тебя</div>
  <!-- ↓↓↓ ИМЯ ЖЕНЫ ↓↓↓ -->
  <h1 id="name">Альбина</h1>
  <p class="sub">Ты — самое лучшее, что случилось в моей жизни 💗</p>
  <button id="btn">Нажми меня ✨</button>

  <nav class="extras">
    <a href="game.html">🎮 Поймай сердечки</a>
    <a href="wheel.html">🎡 Колесо комплиментов</a>
  </nav>

  <div class="toast" id="toast"></div>

<script>
  // Список милых сообщений — можно дописать свои
  const messages = [
    "Я люблю тебя больше всего на свете ❤️",
    "С тобой каждый день — праздник 🎉",
    "Ты делаешь меня счастливым 🥰",
    "Спасибо, что ты есть 💫",
    "Ты прекрасна 🌸",
    "Моё сердце бьётся для тебя 💓",
    "Ты — моя любимая ✨",
    "Альбина, ты — моё всё 💞",
    "Твоя улыбка делает мой день 😊",
    "Хочу обнять тебя прямо сейчас 🤗",
    "Ты — моя любимая на свете звёздочка ⭐",
    "С тобой я дома, где бы мы ни были 🏡",
    "Каждый день с тобой — подарок 🎁",
    "Ты самая красивая 💐",
    "Я выбрал бы тебя снова и снова 💍",
    "Люблю твой смех больше всего на свете 😄",
    "Ты вдохновляешь меня быть лучше 🌟",
    "Спасибо, что любишь меня 💗"
  ];

  const colors = ['❤️','💗','💖','💕','💝','🌸','✨','💜'];

  // Сердечки летят вверх
  function spawnHeart(x) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = colors[Math.floor(Math.random() * colors.length)];
    h.style.left = (x ?? Math.random() * 100) + 'vw';
    h.style.fontSize = (1.2 + Math.random() * 2.2) + 'rem';
    const dur = 4 + Math.random() * 4;
    h.style.animationDuration = dur + 's';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000);
  }
  setInterval(() => spawnHeart(), 600);

  // Кнопка — фейерверк сердечек + сообщение
  const toast = document.getElementById('toast');
  let i = 0;
  document.getElementById('btn').addEventListener('click', () => {
    for (let k = 0; k < 14; k++) {
      setTimeout(() => spawnHeart(40 + Math.random() * 20), k * 40);
    }
    toast.textContent = messages[i % messages.length];
    i++;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 3500);
  });
</script>
</body>
</html>
